<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Favory</title>

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--tg-theme-bg-color, #ffffff);
    color: var(--tg-theme-text-color, #1a1a1a);
    padding-bottom: 30px;
  }

  .brand-header {
    padding: 20px 16px 16px;
    text-align: center;
    position: sticky;
    top: 0;
    background: var(--tg-theme-bg-color, #ffffff);
    z-index: 10;
    border-bottom: 1px solid #e8e8e8;
  }

  .brand-logo-img {
    max-width: 160px;
    width: 100%;
    height: auto;
    transition: filter 0.2s;
  }

  .search-wrap {
    padding: 14px 16px 4px;
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .search-box {
    flex: 1;
    padding: 12px 16px;
    border-radius: 10px;
    border: 1px solid #e0e0e0;
    background: var(--tg-theme-secondary-bg-color, #f5f5f5);
    color: var(--tg-theme-text-color, #1a1a1a);
    font-size: 15px;
    outline: none;
  }

  .search-box::placeholder {
    color: #a0a0a0;
  }

  .currency-switch {
    display: flex;
    border: 1px solid #d5d5d5;
    border-radius: 10px;
    overflow: hidden;
    flex-shrink: 0;
  }

  .curr-btn {
    padding: 12px 14px;
    border: none;
    background: #ffffff;
    color: #1a1a1a;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }

  .curr-btn.active {
    background: #1a1a1a;
    color: #ffffff;
  }

  .rate-info {
    padding: 4px 16px 8px;
    font-size: 11px;
    color: #999999;
    text-align: right;
  }

  .categories {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding: 12px 16px;
    scrollbar-width: none;
  }

  .categories::-webkit-scrollbar { display: none; }
