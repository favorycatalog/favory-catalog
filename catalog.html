<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Favory</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--tg-theme-bg-color, #ffffff);
    color: var(--tg-theme-text-color, #1a1a1a);
    padding-bottom: 30px;
  }

  .brand-header {
    padding: 20px 16px 16px;
    text-align: center;
    position: sticky;
    top: 0;
    background: var(--tg-theme-bg-color, #ffffff);
    z-index: 10;
    border-bottom: 1px solid #e8e8e8;
  }

  .brand-logo-img {
    max-width: 160px;
    width: 100%;
    height: auto;
    transition: filter 0.2s;
  }

  .search-wrap {
    padding: 14px 16px 4px;
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .search-box {
    flex: 1;
    padding: 12px 16px;
    border-radius: 10px;
    border: 1px solid #e0e0e0;
    background: var(--tg-theme-secondary-bg-color, #f5f5f5);
    color: var(--tg-theme-text-color, #1a1a1a);
    font-size: 15px;
    outline: none;
  }

  .search-box::placeholder {
    color: #a0a0a0;
  }

  .currency-switch {
    display: flex;
    border: 1px solid #d5d5d5;
    border-radius: 10px;
    overflow: hidden;
    flex-shrink: 0;
  }

  .curr-btn {
    padding: 12px 14px;
    border: none;
    background: #ffffff;
    color: #1a1a1a;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }

  .curr-btn.active {
    background: #1a1a1a;
    color: #ffffff;
  }

  .rate-info {
    padding: 4px 16px 8px;
    font-size: 11px;
    color: #999999;
    text-align: right;
  }

  .categories {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding: 12px 16px;
    scrollbar-width: none;
  }

  .categories::-webkit-scrollbar { display: none; }

  .cat-btn {
    white-space: nowrap;
    padding: 8px 18px;
    border-radius: 8px;
    border: 1px solid #d5d5d5;
    background: #ffffff;
    color: #1a1a1a;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
  }

  .cat-btn.active {
    background: #1a1a1a;
    border-color: #1a1a1a;
    color: #ffffff;
  }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    padding: 8px 16px;
  }

  .card {
    background: var(--tg-theme-secondary-bg-color, #fafafa);
    border-radius: 12px;
    overflow: hidden;
    transition: transform 0.15s;
    border: 1px solid #eaeaea;
  }

  .card:active { transform: scale(0.97); }

  .card-img {
    width: 100%;
    aspect-ratio: 1;
    background: linear-gradient(135deg, #f0f0f0, #e0e0e0);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #b0b0b0;
    font-size: 12px;
  }

  .card-body { padding: 10px 12px 12px; }

  .card-category {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #999999;
    margin-bottom: 3px;
    font-weight: 600;
  }

  .card-title {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 4px;
    line-height: 1.3;
    color: #1a1a1a;
  }

  .card-price {
    font-size: 15px;
    font-weight: 700;
    color: #1a1a1a;
    margin-bottom: 8px;
  }

  .card-btn {
    width: 100%;
    padding: 8px;
    border-radius: 8px;
    border: none;
    background: #1a1a1a;
    color: #ffffff;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }

  .empty {
    text-align: center;
    padding: 40px 16px;
    color: #999999;
  }
</style>
</head>
<body>

<div class="brand-header">
  <img src="logo.png" alt="Favory" class="brand-logo-img" id="logoImg">
</div>

<div class="search-wrap">
  <input type="text" class="search-box" placeholder="🔍 Найти украшение..." id="searchInput">
  <div class="currency-switch">
    <button class="curr-btn active" data-curr="USD">$</button>
    <button class="curr-btn" data-curr="KZT">₸</button>
  </div>
</div>

<div class="rate-info" id="rateInfo">Курс: загрузка...</div>

<div class="categories" id="categories">
  <button class="cat-btn active" data-cat="all">Все</button>
  <button class="cat-btn" data-cat="rings">Кольца</button>
  <button class="cat-btn" data-cat="earrings">Серьги</button>
  <button class="cat-btn" data-cat="pendants">Подвески</button>
  <button class="cat-btn" data-cat="bracelets">Браслеты</button>
  <button class="cat-btn" data-cat="sets">Комплекты</button>
</div>

<div class="grid" id="productGrid"></div>

<div class="empty" id="emptyState" style="display:none;">
  Ничего не найдено 🔍
</div>

<script>
  const tg = window.Telegram.WebApp;
  tg.ready();
  tg.expand();

  // ==== АВТОМАТИЧЕСКОЕ ПЕРЕКЛЮЧЕНИЕ ЛОГОТИПА ПОД ТЕМУ ====
  function updateLogoForTheme() {
    const logo = document.getElementById("logoImg");
    if (tg.colorScheme === "dark") {
      logo.style.filter = "invert(1)";
    } else {
      logo.style.filter = "none";
    }
  }

  updateLogoForTheme();
  tg.onEvent("themeChanged", updateLogoForTheme);

  // ==== ТОВАРЫ (цена указывается в долларах — это "базовая" валюта) ====
  const products = [
    { id: 1, title: "Кольцо с бриллиантом", priceUSD: 480, category: "rings", img: "" },
    { id: 2, title: "Серьги золотые с жемчугом", priceUSD: 300, category: "earrings", img: "" },
    { id: 3, title: "Подвеска \"Сердце\"", priceUSD: 190, category: "pendants", img: "" },
    { id: 4, title: "Браслет плетёный", priceUSD: 240, category: "bracelets", img: "" },
    { id: 5, title: "Комплект \"Классика\"", priceUSD: 650, category: "sets", img: "" },
    { id: 6, title: "Кольцо обручальное", priceUSD: 165, category: "rings", img: "" },
    { id: 7, title: "Серьги-гвоздики", priceUSD: 100, category: "earrings", img: "" },
    { id: 8, title: "Браслет теннисный", priceUSD: 400, category: "bracelets", img: "" },
  ];

  let currentCategory = "all";
  let currentSearch = "";
  let currentCurrency = "USD";
  let usdToKztRate = 480;

  const categoryNames = {
    rings: "Кольцо",
    earrings: "Серьги",
    pendants: "Подвеска",
    bracelets: "Браслет",
    sets: "Комплект"
  };

  async function fetchExchangeRate() {
    try {
      const response = await fetch("https://open.er-api.com/v6/latest/USD");
      const data = await response.json();
      if (data && data.rates && data.rates.KZT) {
        usdToKztRate = data.rates.KZT;
        document.getElementById("rateInfo").textContent = 
          `Курс: 1$ = ${Math.round(usdToKztRate)}₸`;
      }
    } catch (error) {
      document.getElementById("rateInfo").textContent = 
        `Курс: 1$ ≈ ${usdToKztRate}₸ (примерный)`;
    }
    renderProducts();
  }

  function formatPrice(priceUSD) {
    if (currentCurrency === "USD") {
      return `$${priceUSD.toLocaleString('en-US')}`;
    } else {
      const priceKZT = Math.round(priceUSD * usdToKztRate);
      return `${priceKZT.toLocaleString('ru-RU')} ₸`;
    }
  }

  function renderProducts() {
    const grid = document.getElementById("productGrid");
    const empty = document.getElementById("emptyState");
    
    const filtered = products.filter(p => {
      const matchCat = currentCategory === "all" || p.category === currentCategory;
      const matchSearch = p.title.toLowerCase().includes(currentSearch.toLowerCase());
      return matchCat && matchSearch;
    });

    if (filtered.length === 0) {
      grid.innerHTML = "";
      empty.style.display = "block";
      return;
    }
    
    empty.style.display = "none";
    grid.innerHTML = filtered.map(p => `
      <div class="card">
        <div class="card-img">Фото</div>
        <div class="card-body">
          <div class="card-category">${categoryNames[p.category] || ""}</div>
          <div class="card-title">${p.title}</div>
          <div class="card-price">${formatPrice(p.priceUSD)}</div>
          <button class="card-btn" onclick="orderProduct(${p.id})">Заказать</button>
        </div>
      </div>
    `).join("");
  }

  function orderProduct(id) {
    const product = products.find(p => p.id === id);
    tg.sendData(JSON.stringify({ 
      action: "order", 
      product: product,
      currency: currentCurrency,
      displayedPrice: formatPrice(product.priceUSD)
    }));
  }

  document.getElementById("categories").addEventListener("click", (e) => {
    if (!e.target.classList.contains("cat-btn")) return;
    document.querySelectorAll(".cat-btn").forEach(b => b.classList.remove("active"));
    e.target.classList.add("active");
    currentCategory = e.target.dataset.cat;
    renderProducts();
  });

  document.querySelector(".currency-switch").addEventListener("click", (e) => {
    if (!e.target.classList.contains("curr-btn")) return;
    document.querySelectorAll(".curr-btn").forEach(b => b.classList.remove("active"));
    e.target.classList.add("active");
    currentCurrency = e.target.dataset.curr;
    renderProducts();
  });

  document.getElementById("searchInput").addEventListener("input", (e) => {
    currentSearch = e.target.value;
    renderProducts();
  });

  fetchExchangeRate();
</script>

</body>
</html>
