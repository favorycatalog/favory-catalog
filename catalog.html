<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Favory — Каталог</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root {
    --bg-color: #ffffff;
    --text-color: #111111;
    --card-bg: #f2f2f2;
    --accent: #111111;
    --accent-text: #ffffff;
    --border-color: #c0c0c0;
    --price-color: #8a8a8a;
  }
  body.dark-theme {
    --bg-color: #121212;
    --text-color: #ffffff;
    --card-bg: #1e1e1e;
    --accent: #ffffff;
    --accent-text: #000000;
    --border-color: #555555;
    --price-color: #b0b0b0;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background-color: var(--bg-color);
    color: var(--text-color);
    padding: 16px;
    transition: background-color 0.2s, color 0.2s;
  }
  .header {
    text-align: center;
    margin-bottom: 16px;
  }
  .logo {
    max-width: 140px;
    margin-bottom: 8px;
    transition: filter 0.2s;
  }
  body.dark-theme .logo {
    filter: invert(1);
  }
  .categories {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding-bottom: 8px;
    margin-bottom: 16px;
  }
  .category-btn {
    flex-shrink: 0;
    padding: 8px 16px;
    border-radius: 20px;
    border: 1px solid var(--border-color);
    background: none;
    color: var(--text-color);
    font-size: 14px;
    cursor: pointer;
  }
  .category-btn.active {
    background-color: var(--accent);
    color: var(--accent-text);
    border-color: var(--accent);
  }
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .product-card {
    background-color: var(--card-bg);
    border-radius: 14px;
    overflow: hidden;
    cursor: pointer;
    display: flex;
    flex-direction: column;
  }
  .product-photo {
    width: 100%;
    aspect-ratio: 1 / 1;
    object-fit: cover;
    background-color: #ddd;
  }
  .product-info {
    padding: 10px;
  }
  .product-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-color);
    margin: 0 0 4px 0;
  }
  .product-price {
    font-size: 15px;
    font-weight: 700;
    color: var(--price-color);
    margin: 0 0 8px 0;
  }
  .buy-btn {
    width: 100%;
    padding: 8px;
    border: none;
    border-radius: 8px;
    background-color: var(--accent);
    color: var(--accent-text);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }
</style>
</head>
<body>

<div class="header">
  <img class="logo" id="logo" src="logo.png" alt="Favory">
</div>

<div class="categories" id="categories"></div>

<div class="grid" id="grid"></div>

<script>
const tg = window.Telegram.WebApp;
try { tg.ready(); tg.expand(); } catch(e) {}
try { tg.BackButton.hide(); } catch(e) {}

const PRODUCTS = [
  { id: 1, title: "Кольцо с бриллиантом", priceUSD: 480, category: "rings", photoMain: "https://picsum.photos/seed/ring1/400" },
  { id: 2, title: "Кольцо classic", priceUSD: 320, category: "rings", photoMain: "https://picsum.photos/seed/ring2/400" },
  { id: 3, title: "Серьги гвоздики", priceUSD: 210, category: "earrings", photoMain: "https://picsum.photos/seed/earr1/400" },
  { id: 4, title: "Колье тонкое", priceUSD: 390, category: "necklaces", photoMain: "https://picsum.photos/seed/neck1/400" },
  { id: 5, title: "Браслет цепочка", priceUSD: 275, category: "bracelets", photoMain: "https://picsum.photos/seed/brac1/400" },
  { id: 6, title: "Серьги подвески", priceUSD: 260, category: "earrings", photoMain: "https://picsum.photos/seed/earr2/400" },
];

const CATEGORIES = [
  { key: "all", label: "Все" },
  { key: "rings", label: "Кольца" },
  { key: "earrings", label: "Серьги" },
  { key: "necklaces", label: "Колье" },
  { key: "bracelets", label: "Браслеты" },
];

let activeCategory = "all";

function updateTheme() {
  let isDark = false;
  try { isDark = tg.colorScheme === "dark"; }
  catch(e) { isDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches; }
  document.body.classList.toggle("dark-theme", isDark);
}

updateTheme();
try { tg.onEvent("themeChanged", updateTheme); } catch(e) {}

function renderCategories() {
  const wrap = document.getElementById("categories");
  wrap.innerHTML = "";
  CATEGORIES.forEach(cat => {
    const btn = document.createElement("button");
    btn.className = "category-btn" + (cat.key === activeCategory ? " active" : "");
    btn.innerText = cat.label;
    btn.onclick = () => {
      activeCategory = cat.key;
      renderCategories();
      renderProducts();
    };
    wrap.appendChild(btn);
  });
}

function renderProducts() {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";
  const filtered = activeCategory === "all"
    ? PRODUCTS
    : PRODUCTS.filter(p => p.category === activeCategory);

  filtered.forEach(product => {
    const card = document.createElement("div");
    card.className = "product-card";
    card.innerHTML = `
      <img class="product-photo" src="${product.photoMain}" alt="${product.title}">
      <div class="product-info">
        <div class="product-title">${product.title}</div>
        <div class="product-price">$${product.priceUSD}</div>
        <button class="buy-btn">Купить</button>
      </div>
    `;

    card.onclick = function() {
      window.location.href = `product.html?id=${product.id}`;
    };

    const buyBtn = card.querySelector(".buy-btn");
    buyBtn.onclick = function(event) {
      event.stopPropagation();
      buyProduct(product.id);
    };

    grid.appendChild(card);
  });
}

function buyProduct(id) {
  try {
    tg.sendData(JSON.stringify({ action: "buy", id: id }));
  } catch(e) {
    alert("Товар куплен (тест): ID " + id);
  }
}

renderCategories();
renderProducts();
</script>

</body>
</html>
