<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Favory — Товар</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root {
    --bg-color: #ffffff;
    --text-color: #111111;
    --card-bg: #f2f2f2;
    --accent: #111111;
    --accent-text: #ffffff;
    --border-color: #c0c0c0;
    --price-color: #8a8a8a;
  }
  body.dark-theme {
    --bg-color: #121212;
    --text-color: #ffffff;
    --card-bg: #1e1e1e;
    --accent: #ffffff;
    --accent-text: #000000;
    --border-color: #555555;
    --price-color: #b0b0b0;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background-color: var(--bg-color);
    color: var(--text-color);
    padding: 16px;
    transition: background-color 0.2s, color 0.2s;
  }
  .gallery-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }
  .gallery-tab-btn {
    padding: 6px 14px;
    border-radius: 16px;
    border: 1px solid var(--border-color);
    background: none;
    color: var(--text-color);
    font-size: 13px;
    cursor: pointer;
  }
  .gallery-tab-btn.active {
    background-color: var(--accent);
    color: var(--accent-text);
    border-color: var(--accent);
  }
  .main-photo {
    width: 100%;
    aspect-ratio: 1 / 1;
    object-fit: cover;
    border-radius: 14px;
    background-color: #ddd;
    margin-bottom: 10px;
  }
  .thumbs {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding-bottom: 8px;
    margin-bottom: 16px;
  }
  .thumb {
    width: 64px;
    height: 64px;
    object-fit: cover;
    border-radius: 8px;
    flex-shrink: 0;
    cursor: pointer;
    border: 2px solid transparent;
    opacity: 0.7;
  }
  .thumb.active {
    border-color: var(--accent);
    opacity: 1;
  }
  .video-wrap {
    margin-bottom: 16px;
  }
  .video-wrap iframe {
    width: 100%;
    aspect-ratio: 16/9;
    border-radius: 14px;
    border: none;
  }
  .articul {
    font-size: 13px;
    color: var(--price-color);
    margin-bottom: 4px;
  }
  .title {
    font-size: 20px;
    font-weight: 700;
    margin: 0 0 8px 0;
  }
  .price {
    font-size: 22px;
    font-weight: 700;
    color: var(--price-color);
    margin-bottom: 16px;
  }
  .description {
    font-size: 15px;
    line-height: 22px;
    margin-bottom: 24px;
    white-space: pre-line;
  }
  .buy-btn {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 12px;
    background-color: var(--accent);
    color: var(--accent-text);
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
  }
  .not-found {
    text-align: center;
    padding: 40px 0;
    font-size: 16px;
  }
</style>
</head>
<body>

<div id="content"></div>

<script>
const tg = window.Telegram.WebApp;
try { tg.ready(); tg.expand(); } catch(e) {}
try { tg.BackButton.show(); tg.BackButton.onClick(function() { window.location.href = "catalog.html"; }); } catch(e) {}

const MANAGER_PHONE = "77777778050";

const PRODUCTS = [
  {
    id: 1, articul: "R-001", title: "Кольцо с бриллиантом", priceKZT: 220000, category: "rings",
    photosWhite: ["https://picsum.photos/seed/ring1a/600", "https://picsum.photos/seed/ring1b/600"],
    photosModel: ["https://picsum.photos/seed/ring1m/600"],
    videoId: "dQw4w9WgXcQ",
    description: "Элегантное кольцо из белого золота с бриллиантом. Идеально подходит для особых случаев."
  },
  {
    id: 2, articul: "R-002", title: "Кольцо classic", priceKZT: 150000, category: "rings",
    photosWhite: ["https://picsum.photos/seed/ring2a/600"],
    photosModel: ["https://picsum.photos/seed/ring2m/600"],
    videoId: "",
    description: "Классическое кольцо на каждый день. Универсальный дизайн, качественные материалы."
  },
  {
    id: 3, articul: "E-001", title: "Серьги гвоздики", priceKZT: 95000, category: "earrings",
    photosWhite: ["https://picsum.photos/seed/earr1a/600"],
    photosModel: ["https://picsum.photos/seed/earr1m/600"],
    videoId: "",
    description: "Лёгкие серьги-гвоздики, которые подойдут к любому образу."
  },
  {
    id: 4, articul: "N-001", title: "Колье тонкое", priceKZT: 180000, category: "necklaces",
    photosWhite: ["https://picsum.photos/seed/neck1a/600"],
    photosModel: ["https://picsum.photos/seed/neck1m/600"],
    videoId: "",
    description: "Изящное тонкое колье, подчёркивающее шею и декольте."
  },
  {
    id: 5, articul: "B-001", title: "Браслет цепочка", priceKZT: 125000, category: "bracelets",
    photosWhite: ["https://picsum.photos/seed/brac1a/600"],
    photosModel: ["https://picsum.photos/seed/brac1m/600"],
    videoId: "",
    description: "Стильный браслет-цепочка, подходит для повседневной носки."
  },
  {
    id: 6, articul: "E-002", title: "Серьги подвески", priceKZT: 120000, category: "earrings",
    photosWhite: ["https://picsum.photos/seed/earr2a/600"],
    photosModel: ["https://picsum.photos/seed/earr2m/600"],
    videoId: "",
    description: "Романтичные серьги-подвески для вечернего образа."
  },
];

function updateTheme() {
  let isDark = false;
  try { isDark = tg.colorScheme === "dark"; }
  catch(e) { isDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches; }
  document.body.classList.toggle("dark-theme", isDark);
}
updateTheme();
try { tg.onEvent("themeChanged", updateTheme); } catch(e) {}

function formatPrice(price) {
  return price.toLocaleString("ru-RU") + " ₸";
}

function getProductIdFromUrl() {
  const params = new URLSearchParams(window.location.search);
  return parseInt(params.get("id"), 10);
}

function openWhatsApp(articul) {
  const text = "Здравствуйте, я пишу из приложения Telegram по поводу изделия с артикулом " + articul;
  const url = "https://wa.me/" + MANAGER_PHONE + "?text=" + encodeURIComponent(text);
  window.location.href = url;
}

let activeTab = "white";
let activePhotoIndex = 0;

function render() {
  const id = getProductIdFromUrl();
  const product = PRODUCTS.find(function(p) { return p.id === id; });
  const content = document.getElementById("content");

  if (!product) {
    content.innerHTML = '<div class="not-found">Товар не найден</div>';
    return;
  }

  let html = '';

  html += '<div class="gallery-tabs">';
  html += '<button class="gallery-tab-btn' + (activeTab === "white" ? " active" : "") + '" onclick="setTab(\'white\')">На белом</button>';
  html += '<button class="gallery-tab-btn' + (activeTab === "model" ? " active" : "") + '" onclick="setTab(\'model\')">На модели</button>';
  if (product.videoId) {
    html += '<button class="gallery-tab-btn' + (activeTab === "youtube" ? " active" : "") + '" onclick="setTab(\'youtube\')">YouTube</button>';
  }
  html += '</div>';

  if (activeTab === "youtube" && product.videoId) {
    html += '<div class="video-wrap"><iframe src="https://www.youtube.com/embed/' + product.videoId + '" allowfullscreen></iframe></div>';
  } else {
    const currentPhotos = activeTab === "model" ? product.photosModel : product.photosWhite;
    const mainPhoto = currentPhotos[activePhotoIndex] || currentPhotos[0];

    html += '<img class="main-photo" src="' + mainPhoto + '" alt="' + product.title + '">';

    if (currentPhotos.length > 1) {
      html += '<div class="thumbs">';
      currentPhotos.forEach(function(photo, index) {
        html += '<img class="thumb' + (index === activePhotoIndex ? " active" : "") + '" src="' + photo + '" onclick="setPhoto(' + index + ')">';
      });
      html += '</div>';
    }
  }

  html += '<div class="articul">Артикул: ' + product.articul + '</div>';
  html += '<div class="title">' + product.title + '</div>';
  html += '<div class="price">' + formatPrice(product.priceKZT) + '</div>';
  html += '<div class="description">' + product.description + '</div>';
  html += '<button class="buy-btn" onclick="openWhatsApp(\'' + product.articul + '\')">Купить</button>';

  content.innerHTML = html;
}

function setTab(tab) {
  activeTab = tab;
  activePhotoIndex = 0;
  render();
}

function setPhoto(index) {
  activePhotoIndex = index;
  render();
}

render();
</script>

</body>
</html>
