<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Товар — Favory</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root {
    --bg-color: #ffffff;
    --text-color: #111111;
    --card-bg: #f2f2f2;
    --accent: #111111;
    --accent-text: #ffffff;
    --border-color: #c0c0c0;
    --price-color: #8a8a8a;
  }
  body.dark-theme {
    --bg-color: #121212;
    --text-color: #ffffff;
    --card-bg: #1e1e1e;
    --accent: #ffffff;
    --accent-text: #000000;
    --border-color: #555555;
    --price-color: #b0b0b0;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background-color: var(--bg-color);
    color: var(--text-color);
    padding: 16px;
    transition: background-color 0.2s, color 0.2s;
  }
  .tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
  }
  .tab-btn {
    flex: 1;
    padding: 8px;
    border-radius: 10px;
    border: 1px solid var(--border-color);
    background: none;
    color: var(--text-color);
    font-size: 13px;
    cursor: pointer;
  }
  .tab-btn.active {
    background-color: var(--accent);
    color: var(--accent-text);
    border-color: var(--accent);
  }
  .gallery {
    display: flex;
    overflow-x: auto;
    gap: 10px;
    margin-bottom: 16px;
    scroll-snap-type: x mandatory;
  }
  .gallery img {
    width: 100%;
    flex-shrink: 0;
    scroll-snap-align: center;
    border-radius: 14px;
    aspect-ratio: 1 / 1;
    object-fit: cover;
    background-color: var(--card-bg);
  }
  h1 {
    font-size: 20px;
    margin: 0 0 6px 0;
  }
  .price {
    font-size: 22px;
    font-weight: 700;
    color: var(--price-color);
    margin: 0 0 20px 0;
  }
  .buy-btn {
    width: 100%;
    padding: 15px;
    border: none;
    border-radius: 12px;
    background-color: var(--accent);
    color: var(--accent-text);
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
  }
  .not-found {
    text-align: center;
    padding: 60px 20px;
    opacity: 0.7;
  }
</style>
</head>
<body>

<div id="content"></div>

<script>
const tg = window.Telegram.WebApp;
try { tg.ready(); tg.expand(); } catch(e) {}

try {
  tg.BackButton.show();
  tg.BackButton.onClick(function() {
    window.location.href = "catalog.html";
  });
} catch(e) {}

const PRODUCTS = [
  {
    id: 1,
    title: "Кольцо с бриллиантом",
    priceUSD: 480,
    photosWhite: [
      "https://picsum.photos/seed/ring1a/500",
      "https://picsum.photos/seed/ring1b/500"
    ],
    photosModel: [
      "https://picsum.photos/seed/ring1model1/500"
    ]
  },
  {
    id: 2,
    title: "Кольцо classic",
    priceUSD: 320,
    photosWhite: [
      "https://picsum.photos/seed/ring2a/500",
      "https://picsum.photos/seed/ring2b/500"
    ],
    photosModel: [
      "https://picsum.photos/seed/ring2model1/500"
    ]
  },
  {
    id: 3,
    title: "Серьги гвоздики",
    priceUSD: 210,
    photosWhite: [
      "https://picsum.photos/seed/earr1a/500",
      "https://picsum.photos/seed/earr1b/500"
    ],
    photosModel: [
      "https://picsum.photos/seed/earr1model1/500"
    ]
  },
  {
    id: 4,
    title: "Колье тонкое",
    priceUSD: 390,
    photosWhite: [
      "https://picsum.photos/seed/neck1a/500",
      "https://picsum.photos/seed/neck1b/500"
    ],
    photosModel: [
      "https://picsum.photos/seed/neck1model1/500"
    ]
  },
  {
    id: 5,
    title: "Браслет цепочка",
    priceUSD: 275,
    photosWhite: [
      "https://picsum.photos/seed/brac1a/500",
      "https://picsum.photos/seed/brac1b/500"
    ],
    photosModel: [
      "https://picsum.photos/seed/brac1model1/500"
    ]
  },
  {
    id: 6,
    title: "Серьги подвески",
    priceUSD: 260,
    photosWhite: [
      "https://picsum.photos/seed/earr2a/500",
      "https://picsum.photos/seed/earr2b/500"
    ],
    photosModel: [
      "https://picsum.photos/seed/earr2model1/500"
    ]
  }
];

function updateTheme() {
  let isDark = false;
  try {
    isDark = tg.colorScheme === "dark";
  } catch(e) {
    isDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
  }
  document.body.classList.toggle("dark-theme", isDark);
}

updateTheme();
try { tg.onEvent("themeChanged", updateTheme); } catch(e) {}

const params = new URLSearchParams(window.location.search);
const productId = Number(params.get("id"));
const product = PRODUCTS.find(function(p) { return p.id === productId; });

let activeTab = "white";

function setTab(tab) {
  activeTab = tab;
  render();
}

function render() {
  const content = document.getElementById("content");

  if (!product) {
    content.innerHTML = '<div class="not-found">Товар не найден</div>';
    return;
  }

  const tabsHtml =
    '<div class="tabs">' +
      '<button class="tab-btn ' + (activeTab === "white" ? "active" : "") + '" onclick="setTab(\'white\')">На белом</button>' +
      '<button class="tab-btn ' + (activeTab === "model" ? "active" : "") + '" onclick="setTab(\'model\')">На модели</button>' +
    '</div>';

  let photos = activeTab === "white" ? product.photosWhite : product.photosModel;

  let galleryHtml = '<div class="gallery">';
  photos.forEach(function(url) {
    galleryHtml += '<img src="' + url + '" alt="' + product.title + '">';
  });
  galleryHtml += '</div>';

  content.innerHTML =
    tabsHtml +
    galleryHtml +
    '<h1>' + product.title + '</h1>' +
    '<div class="price">$' + product.priceUSD + '</div>' +
    '<button class="buy-btn" onclick="buyProduct(' + product.id + ')">Купить</button>';
}

function buyProduct(id) {
  try {
    tg.sendData(JSON.stringify({ action: "buy", id: id }));
  } catch(e) {
    alert("Товар куплен (тест): ID " + id);
  }
}

render();
</script>

</body>
</html>
